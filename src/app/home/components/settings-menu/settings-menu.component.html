<ion-menu contentId="main-content" type="overlay">
  <ion-header>
    <ion-toolbar>
      <ion-title>Configurações</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content>
    <ion-list lines="full">
      <ion-list-header>Diagnóstico</ion-list-header>
      <ion-item>
        <ion-label>
          <h2>Testar microfone</h2>
          <p>Verifica se o microfone captura som corretamente.</p>
          <p *ngIf="micTestStatus" class="mic-test-status">{{ micTestStatus }}</p>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-button expand="block" fill="outline" (click)="testMicrophone.emit()" [disabled]="isProcessing">
          {{ isProcessing ? 'Processando…' : 'Iniciar teste' }}
        </ion-button>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>
