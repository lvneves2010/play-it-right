<app-settings-menu
  [isProcessing]="isProcessing"
  [micTestStatus]="micTestStatus"
  (testMicrophone)="recognizeNote()">
</app-settings-menu>

<div id="main-content" class="ion-page">
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title>K.I.R.A.</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content [fullscreen]="true" class="home-content">
    <ion-header collapse="condense">
      <ion-toolbar>
        <ion-title size="large">K.I.R.A.</ion-title>
      </ion-toolbar>
    </ion-header>

    <div id="welcome-card">
      <app-brand-header></app-brand-header>

      <ion-alert
        [isOpen]="errorAlertOpen"
        header="Erro"
        [message]="errorMessage"
        buttons="OK"
        (didDismiss)="errorAlertOpen = false">
      </ion-alert>

      <div class="hero-copy">
        <p>Toque no botão abaixo e fale seu comando. Diga "Kira" seguido da sua dúvida para consultar a IA.</p>
      </div>

      <app-status-panel
        [statusText]="statusText"
        [recognizedNote]="recognizedNote"
        [recognizedCommand]="recognizedCommand"
        [commandResponse]="commandResponse"
        [canSave]="!!lastResponseText"
        (save)="saveResponseToFile()">
      </app-status-panel>

      <app-save-banner
        [visible]="awaitingSaveCommand && !isSpeaking"
        [listening]="isListeningForSave">
      </app-save-banner>

      <app-voice-action
        [isSpeaking]="isSpeaking"
        [isListeningForCommand]="isListeningForCommand"
        (start)="startCommandRecognition()"
        (stop)="stopSpeaking()">
      </app-voice-action>
    </div>
  </ion-content>
</div>
