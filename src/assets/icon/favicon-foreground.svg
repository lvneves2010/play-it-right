<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="coreGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b6dff"/>
      <stop offset="100%" stop-color="#57d7ff"/>
    </linearGradient>
    <filter id="coreShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- kinetic orbit (sized within the adaptive-icon safe zone) -->
  <g transform="translate(128,128) rotate(-26)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="80" ry="38" fill="none" stroke="#57d7ff" stroke-width="5"/>
    <circle cx="80" cy="0" r="7" fill="#57d7ff"/>
    <circle cx="-80" cy="0" r="5" fill="#8b6dff"/>
  </g>

  <!-- core -->
  <circle cx="128" cy="128" r="64" fill="url(#coreGradient)" filter="url(#coreShadow)"/>

  <!-- K monogram -->
  <path d="M106 88v80M106 128l44-40M106 128l44 40"
        fill="none" stroke="#ffffff" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
